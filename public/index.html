<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🛒 TK 쇼핑몰</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 상단 헤더 -->
    <header>
      <h1>🛒 TK 쇼핑몰</h1>
      <div id="auth-area">
        <!-- 로그인 상태에 따라 JS가 채움 -->
      </div>
    </header>

    <!-- 탭 메뉴 -->
    <nav class="tabs">
      <button class="tab active" data-tab="products">상품</button>
      <button class="tab" data-tab="cart">장바구니 <span id="cart-count">0</span></button>
      <button class="tab" data-tab="orders">주문내역</button>
      <!-- 관리자에게만 보이는 탭 (JS가 표시) -->
      <button class="tab hidden" data-tab="admin" id="admin-tab">🛠 관리자</button>
    </nav>

    <main>
      <!-- 상품 목록 -->
      <section id="tab-products" class="tab-panel active">
        <h2>상품 목록</h2>
        <div id="product-list" class="grid"></div>
      </section>

      <!-- 장바구니 -->
      <section id="tab-cart" class="tab-panel">
        <h2>장바구니</h2>
        <div id="cart-items"></div>
        <div id="cart-footer" class="hidden">
          <strong>총액: <span id="cart-total">0</span>원</strong>
          <button id="checkout-btn" class="primary">주문하기</button>
        </div>
      </section>

      <!-- 주문 내역 -->
      <section id="tab-orders" class="tab-panel">
        <h2>주문 내역</h2>
        <div id="order-list"></div>
      </section>

      <!-- 관리자: 전체 주문 처리 -->
      <section id="tab-admin" class="tab-panel">
        <h2>🛠 관리자 — 전체 주문 처리</h2>
        <p class="admin-hint">유저별로 주문을 확인하고 상태를 변경할 수 있습니다.</p>
        <div id="admin-list"></div>
      </section>
    </main>

    <!-- 로그인/회원가입 모달 -->
    <div id="auth-modal" class="modal hidden">
      <div class="modal-box">
        <button id="modal-close" class="modal-close">✕</button>
        <div class="modal-tabs">
          <button class="modal-tab active" data-form="login">로그인</button>
          <button class="modal-tab" data-form="register">회원가입</button>
        </div>

        <form id="login-form" class="auth-form active">
          <input type="email" name="email" placeholder="이메일" required />
          <input type="password" name="password" placeholder="비밀번호" required />
          <button type="submit" class="primary">로그인</button>
        </form>

        <form id="register-form" class="auth-form">
          <input type="text" name="name" placeholder="이름" required />
          <input type="email" name="email" placeholder="이메일" required />
          <input type="password" name="password" placeholder="비밀번호 (6자 이상)" required />
          <button type="submit" class="primary">회원가입</button>
        </form>
      </div>
    </div>

    <!-- 알림 토스트 -->
    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
  </body>
</html>
